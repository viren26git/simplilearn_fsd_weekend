<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
           background-color: burlywood;
        }

        h1{
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(245, 249, 249);
            text-align: center;
        }

        .container{
            width:500px;
            margin: auto;
        }

        select, textarea {
            width:100%;
            color: rgba(49, 48, 3, 0.946);
            font-weight: bold;
            font-size: xx-large;
        }

        label{
            color: rgba(59, 57, 17, 0.946);
            font-weight: bold;
            font-size: xx-large; 
        }

        button{
            background-color: blue;
            color:beige;
            font-size: larger;
        }
    </style>
</head>
<body>
      <h1> Contact Page</h1>

      <div class="container">
        <form action="home.html" method="post">
           
            <div>
                <label> Full Name </label>
                <input type="text" id="fullname" placeholder="Enter full Name"/>
            </div>
            <br><br>

            <div>
                <label> Email </label>
                <input type="email" id="email" placeholder="Enter email"/>
            </div>
            <br><br>

            <div>
                <label for="password"> Password </label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required/>
            </div>
            <br><br>

            <div>
                <label> Age </label>
                <input type="number" id="age" placeholder="Enter your age"/>
            </div>
            <br><br>

            <div>
                <label> DOB </label>
                <input type="date" id="dob" required/>
            </div>
            <br><br>

            <div>
                <label> Phone </label>
                <input type="tel" id="phone" />
            </div>
            <br><br>

            <div>
                <label> Experience Level </label>
                <input type="range" min="1" max="25"/>
            </div>
            <br><br>

            <div>
                <label> Upload resume </label>
                <input type="file" name="resume"/>
            </div>
            <br><br>

            <div style="color:darkblue; font-size:x-large; text-shadow: chartreuse;">
                <label> Gender </label>
                <input type="radio" name="gender" value="Male" /> Male
                <input type="radio" name="gender" value="Female" /> Female
            </div>
            <br><br>

            <div>
                <label> Skills </label>
                <input type="checkbox" name="skills" value="Java" /> Java
                <input type="checkbox" name="skills" value="HTML" /> HTML
                <input type="checkbox" name="skills" value="Node JS" /> Node JS
                <input type="checkbox" name="skills" value="React JS" /> React JS
            </div>
            <br><br>

            <div>
                <label> Country </label>
                <select name="country">
                    <option> India </option>
                    <option> USA </option>
                    <option> Canada </option>
                    <option> SA </option>
                    <option> Australia </option>
                </select>
            </div>
             <br><br>

            <div>
                <label> Address </label>
                <textarea rows="15" columns="20" placholder="Enter your address"></textarea>
            </div>
            <br><br>

            <div>
                <label> Search </label>
                <input type="search" placeholder="search here.."/>
            </div>
            <br><br>

            <input type="submit"/>
            <button type="reset"> Reset </button>

        </form>
      </div>
</body>
</html>
